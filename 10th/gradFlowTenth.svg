<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1120 1178" xmlns="http://www.w3.org/2000/svg"
     font-family="'Goudy Old Style', Georgia, serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#686868"/>
  </marker>
</defs>
<rect width="1120" height="1178" fill="#FFFFFF"/>
<rect x="0" y="0" width="1120" height="66" rx="0" fill="#000000" stroke="#000000" stroke-width="1.5"/>
<text x="560" y="42" font-size="22" font-family="Gotham, 'Century Gothic', sans-serif" fill="white" font-weight="bold" text-anchor="middle" opacity="1.0">Lick-Wilmerding High School Course Selection Guide</text>
<text x="44" y="95" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#686868" font-weight="bold" text-anchor="start" opacity="1.0">Key</text>
<rect x="44" y="102" width="220" height="30" rx="6" fill="#F5F5F5" stroke="#686868" stroke-width="1.5"/>
<text x="154" y="121" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#686868" font-weight="bold" text-anchor="middle" opacity="1.0">No Action Needed</text>
<text x="154" y="147" font-size="9" fill="#686868" font-weight="normal" text-anchor="middle" opacity="1.0">Automatic Enrollment or No Action Required</text>
<rect x="314" y="102" width="220" height="30" rx="6" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="424" y="121" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="middle" opacity="1.0">Required Core Course Choice</text>
<text x="424" y="147" font-size="9" fill="#686868" font-weight="normal" text-anchor="middle" opacity="1.0">Required History, English, Math, Science, or Langauge Class Choice</text>
<rect x="584" y="102" width="220" height="30" rx="6" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="694" y="121" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="middle" opacity="1.0">Required Elective Choice</text>
<text x="694" y="147" font-size="9" fill="#686868" font-weight="normal" text-anchor="middle" opacity="1.0">Required Flex or Free Elective Choice</text>
<rect x="854" y="102" width="220" height="30" rx="6" fill="#EEF3FA" stroke="#4D75C5" stroke-width="1.5"/>
<text x="964" y="121" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="middle" opacity="1.0">Optional Elective Choice</text>
<text x="964" y="147" font-size="9" fill="#686868" font-weight="normal" text-anchor="middle" opacity="1.0">Optional Flex or Free Elective Choice</text>
<g transform="translate(0, 90)">
<rect x="44" y="80" width="1032" height="172" rx="12" fill="#EEF3FA" stroke="#4D75C5" stroke-width="2"/>
<text x="62" y="106" font-size="15" font-family="Gotham, 'Century Gothic', sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">Your Flex Elective Pool</text>
<text x="62" y="125" font-size="11" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">Complete these 5 flex electives with flexible timing: complete Performing Arts any year (9th–12th) and all other items in 10th–12th grade only.</text>
<rect x="62" y="135" width="316" height="38" rx="6" fill="white" stroke="#4D75C5" stroke-width="1.2"/>
<text x="72" y="150" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">☐  Performing Arts</text>
<text x="72" y="164" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">1 semester  ·  9th–12th grade</text>
<rect x="390" y="135" width="316" height="38" rx="6" fill="white" stroke="#4D75C5" stroke-width="1.2"/>
<text x="400" y="150" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">☐  Technical Arts: Design &amp; Engineering</text>
<text x="400" y="164" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">1 semester  ·  10th–12th grade</text>
<rect x="718" y="135" width="316" height="38" rx="6" fill="white" stroke="#4D75C5" stroke-width="1.2"/>
<text x="728" y="150" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">☐  Technical Arts: Design &amp; Craft</text>
<text x="728" y="164" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">1 semester  ·  10th–12th grade</text>
<rect x="62" y="183" width="316" height="38" rx="6" fill="white" stroke="#4D75C5" stroke-width="1.2"/>
<text x="72" y="198" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">☐  G Elective  (1st of 2)</text>
<text x="72" y="212" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">1 semester  ·  10th–12th grade</text>
<rect x="390" y="183" width="316" height="38" rx="6" fill="white" stroke="#4D75C5" stroke-width="1.2"/>
<text x="400" y="198" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">☐  G Elective  (2nd of 2)</text>
<text x="400" y="212" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">1 semester  ·  10th–12th grade</text>
<text x="62" y="237" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">→  At every open elective slot: use it for an unchecked pool item first. All 5 checked? Use it as a free elective. Rank ≥5 alternates.</text>
</g>
<g transform="translate(0, -406)">
<rect x="44" y="772" width="1032" height="48" rx="10" fill="#000000" stroke="#000000" stroke-width="1.5"/>
<text x="560" y="792" font-size="17" font-family="Gotham, 'Century Gothic', sans-serif" fill="white" font-weight="bold" text-anchor="middle" opacity="1.0">10th Grade</text>
<text x="560" y="809" font-size="10" fill="rgba(255,255,255,0.65)" font-weight="normal" text-anchor="middle" opacity="1.0">4 course selection requests per semester</text>
<rect x="44" y="822" width="1032" height="62" rx="10" fill="#F5F5F5" stroke="#686868" stroke-width="1.5"/>
<text x="62" y="844" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Auto-enrolled (all year-long):</text>
<text x="62" y="862" font-size="12" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">Chemistry  ·  English 2  ·  World History</text>
<text x="62" y="877" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">None of these use your 4 selection slots.</text>
<line x1="560" y1="884" x2="560" y2="928" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="936" width="1032" height="102" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="956" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Required year-long — uses 2 slots per semester</text>
<text x="62" y="974" font-size="12" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">1.  Math — request the next course in your progression track</text>
<text x="62" y="992" font-size="12" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">2.  World Languages — request the next course in your progression track</text>
<text x="62" y="1010" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   Changing tracks or planning summer coursework?</text>
<text x="62" y="1028" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   Contact the department chair before Apr 23.</text>
<line x1="560" y1="1038" x2="560" y2="1082" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<text x="44" y="1106" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Semester with Health</text>
<rect x="44" y="1116" width="508" height="62" rx="8" fill="#EBF5F6" stroke="#3F808A" stroke-width="1.5"/>
<text x="58" y="1134" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Slot 3 (required): Sophomore Health</text>
<text x="58" y="1152" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Request for this semester.</text>
<text x="58" y="1168" font-size="11" fill="#3F808A" font-weight="normal" text-anchor="start" opacity="1.0">✓  Completes your Body-Mind Education requirement.</text>
<rect x="44" y="1186" width="508" height="118" rx="8" fill="#EEF3FA" stroke="#4D75C5" stroke-width="1.5"/>
<text x="58" y="1204" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">Slot 4 (optional 7th class):</text>
<text x="58" y="1222" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Flex Pool item, free elective, Teaching Assistant, or independent study.</text>
<text x="58" y="1240" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Teaching Assistant / Independent Study: have an informal conversation with the teacher first.</text>
<text x="58" y="1254" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Note their name and class using the notepad icon when requesting.</text>
<text x="58" y="1268" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Official Teaching Assistant / Independent Study form releases in early August — complete it then.</text>
<text x="58" y="1284" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">Haven't decided? You have until end of week 2 of the semester.</text>
<text x="58" y="1298" font-size="10" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Skip this slot if you don't want a 7th class.</text>
<text x="568" y="1106" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Semester without Health</text>
<rect x="568" y="1116" width="508" height="62" rx="8" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="582" y="1134" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">Slot 3 (required): Elective (class minimum = 6):</text>
<text x="582" y="1152" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Flex Pool item or free elective. Rank ≥5 alternates.</text>
<text x="582" y="1166" font-size="10" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Performing / Technical / Visual Arts or G elective.</text>
<rect x="568" y="1186" width="508" height="118" rx="8" fill="#EEF3FA" stroke="#4D75C5" stroke-width="1.5"/>
<text x="582" y="1204" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">Slot 4 (optional 7th class):</text>
<text x="582" y="1222" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Flex Pool item, free elective, Teaching Assistant, or independent study.</text>
<text x="582" y="1240" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Teaching Assistant / Independent Study: have an informal conversation with the teacher first.</text>
<text x="582" y="1254" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Note their name and class using the notepad icon when requesting.</text>
<text x="582" y="1268" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Official Teaching Assistant / Independent Study form releases in early August — complete it then.</text>
<text x="582" y="1284" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">Haven't decided? You have until end of week 2 of the semester.</text>
<text x="582" y="1298" font-size="10" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Skip this slot if you don't want a 7th class.</text>
</g>
<g transform="translate(0, -2304)">
<rect x="44" y="3222" width="1032" height="178" rx="12" fill="#EBF5F6" stroke="#3F808A" stroke-width="1.5"/>
<text x="62" y="3248" font-size="15" font-family="Gotham, 'Century Gothic', sans-serif" fill="#3F808A" font-weight="bold" text-anchor="start" opacity="1.0">Add/Drop</text>
<text x="62" y="3268" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Schedules released August 3  ·  Add/drop window: August 5 (8am) – August 12 (11:59pm)</text>
<text x="62" y="3284" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Spring add/drop window in November (semester courses only)</text>
<text x="62" y="3300" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Year-long courses cannot be dropped or section-switched after the fall window closes (Dean approval only, extremely rare).</text>
<text x="62" y="3316" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Year-long course conflicting with a spring elective? Switch your year-long section during the fall window.</text>
<text x="62" y="3336" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Submit a Scheduling Error Form immediately (before add/drop opens) if any of these apply:</text>
<text x="62" y="3352" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">   Missing a graduation requirement  ·  Wrong class count  ·  Missing a prerequisite  ·  Enrolled in a class you already took</text>
<text x="62" y="3368" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">   Sophomore not enrolled in Health  ·  Senior missing English or History any semester  ·  Under- or over-enrolled</text>
<text x="62" y="3385" font-size="11" fill="#3F808A" font-weight="bold" text-anchor="start" opacity="1.0">Class count: 6 classes (7 max)</text>
<rect x="44" y="3416" width="1032" height="46" rx="8" fill="#000000" stroke="#000000" stroke-width="1.5"/>
<text x="560" y="3434" font-size="11" fill="#686868" font-weight="normal" text-anchor="middle" opacity="1.0">Course request window:  April 12, 5pm  –  April 23, 11:59pm  ·  Cannot edit or submit after deadline</text>
<text x="560" y="3451" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e59f4b" font-weight="bold" text-anchor="middle" opacity="1.0">Click Save before exiting course requests.</text>
<text x="1068" y="3455" font-size="9" fill="#686868" font-weight="normal" text-anchor="end" opacity="1.0">Jeff Treviño, PhD  —  April 2026</text>
</g>
</svg>
