<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1120 1440" xmlns="http://www.w3.org/2000/svg"
     font-family="'Goudy Old Style', Georgia, serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#686868"/>
  </marker>
</defs>
<rect width="1120" height="1440" fill="#FFFFFF"/>
<g transform="translate(0, -2062)">
<rect x="44" y="2082" width="1032" height="48" rx="10" fill="#000000" stroke="#000000" stroke-width="1.5"/>
<text x="560" y="2102" font-size="17" font-family="Gotham, 'Century Gothic', sans-serif" fill="white" font-weight="bold" text-anchor="middle" opacity="1.0">12th Grade</text>
<text x="560" y="2119" font-size="10" fill="rgba(255,255,255,0.65)" font-weight="normal" text-anchor="middle" opacity="1.0">7 course selection requests per semester</text>
<rect x="44" y="2132" width="1032" height="66" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="2"/>
<text x="62" y="2152" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Before you start: tally all outstanding requirements</text>
<text x="62" y="2170" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Check: Math done (3 years)?  ·  World Languages done (3 years + Level 3)?  ·  Science elective done?  ·  All 5 Flex Pool items checked?</text>
<text x="62" y="2188" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Every incomplete item below takes required slots. With 7 slots per semester, there is plenty of room — but count carefully.</text>
<line x1="560" y1="2198" x2="560" y2="2242" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="2250" width="1032" height="84" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="2270" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Required every semester — 1 slot</text>
<text x="62" y="2288" font-size="12" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">1.  Honors English 4 — request one per semester. Rank all Honors English 4 options as alternates.</text>
<text x="62" y="2306" font-size="11" fill="#DC2626" font-weight="normal" text-anchor="start" opacity="1.0">⚠  Creative Writing and Journalism do not count as senior English — exclude them from this list.</text>
<text x="62" y="2324" font-size="11" fill="#3F808A" font-weight="normal" text-anchor="start" opacity="1.0">✓  Completes your English 4-year requirement.</text>
<line x1="560" y1="2334" x2="560" y2="2378" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="2386" width="1032" height="84" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="2406" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Required every semester — 1 slot</text>
<text x="62" y="2424" font-size="12" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">2.  History Seminar — one per semester (Fall seminar for Fall, Spring seminar for Spring).</text>
<text x="62" y="2442" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   Rank all History Seminars as alternates.</text>
<text x="62" y="2460" font-size="11" fill="#3F808A" font-weight="normal" text-anchor="start" opacity="1.0">✓  Completes your History 3-year requirement.</text>
<line x1="560" y1="2470" x2="560" y2="2514" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="2522" width="1032" height="120" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="2542" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Any core requirements still outstanding? Each takes 1 slot per semester (year-long).</text>
<text x="62" y="2560" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">☐  Math not complete  →  request next level. Track change? Contact the department chair before Apr 23.</text>
<text x="62" y="2578" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">☐  World Languages not complete  →  request next level. Track change? Contact the department chair before Apr 23.</text>
<text x="62" y="2596" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">☐  Science elective not done  →  request course. Rank all science courses as alternates.</text>
<text x="62" y="2614" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   Losing any from the alternates list means losing scheduling priority.</text>
<text x="62" y="2632" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   Ethics in the Sciences counts as G elective only — exclude it from science alternates.</text>
<line x1="560" y1="2642" x2="560" y2="2686" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="2694" width="1032" height="80" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="2714" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Enrolled in 5 Core Courses?</text>
<text x="62" y="2732" font-size="12" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">You must be enrolled in at least five A–E courses</text>
<text x="62" y="2750" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   (a=History, b=English, c=Math, d=Lab Science, e=World Languages).</text>
<line x1="560" y1="2774" x2="560" y2="2818" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="2826" width="1032" height="114" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="2846" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">Complete your Flex Pool — this is your last chance.</text>
<text x="62" y="2864" font-size="12" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Any unchecked items must be finished this year. Each one takes a required slot.</text>
<text x="62" y="2882" font-size="12" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Technical Arts check: your Technical Arts electives across 10th–12th must include</text>
<text x="62" y="2900" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">☐  one Design &amp; Engineering course  AND  one Design &amp; Craft course.</text>
<text x="62" y="2918" font-size="12" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">These are separate categories — verify both are covered before finalizing.</text>
<text x="62" y="2936" font-size="12" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Rank ≥5 alternates for each elective.</text>
<line x1="560" y1="2940" x2="560" y2="2984" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="2992" width="508" height="62" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="58" y="3012" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">6th class (required to meet six-class minimum):</text>
<text x="58" y="3030" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Must come from Performing / Technical / Visual Arts or a G-designated elective.</text>
<text x="58" y="3044" font-size="10" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Rank ≥5 alternates.</text>
<rect x="44" y="3062" width="508" height="132" rx="10" fill="#EEF3FA" stroke="#4D75C5" stroke-width="1.5"/>
<text x="58" y="3082" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">7th class (optional, not guaranteed):</text>
<text x="58" y="3100" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Must come from Performing Arts / Technical Arts / Visual Arts / G elective,</text>
<text x="58" y="3114" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">or Teaching Assistant / independent study.</text>
<text x="58" y="3130" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Teaching Assistant / Independent Study: talk informally with the teacher first.</text>
<text x="58" y="3144" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Note their name and class using the notepad icon when requesting.</text>
<text x="58" y="3158" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Official form releases in early August — complete it with your teacher then.</text>
<text x="58" y="3172" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">Haven't decided? You have until end of week 2 of the semester.</text>
<text x="58" y="3186" font-size="10" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Skip this slot if you don't want a 7th class.</text>
<rect x="568" y="2992" width="508" height="218" rx="10" fill="#EEF3FA" stroke="#4D75C5" stroke-width="1.5"/>
<text x="582" y="3014" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e59f4b" font-weight="bold" text-anchor="start" opacity="1.0">Doubling opportunity (optional)</text>
<text x="582" y="3038" font-size="11" fill="#e59f4b" font-weight="normal" text-anchor="start" opacity="1.0">If your World Language, Math, and Science</text>
<text x="582" y="3054" font-size="11" fill="#e59f4b" font-weight="normal" text-anchor="start" opacity="1.0">requirements are all complete, you may take</text>
<text x="582" y="3070" font-size="11" fill="#e59f4b" font-weight="normal" text-anchor="start" opacity="1.0">a 2nd A–E course (a=History, b=English, c=Math,</text>
<text x="582" y="3086" font-size="11" fill="#e59f4b" font-weight="normal" text-anchor="start" opacity="1.0">d=Lab Science, e=World Languages), for 5 total A–E classes.</text>
<text x="582" y="3106" font-size="10" fill="#e59f4b" font-weight="normal" text-anchor="start" opacity="1.0">Rank ≥5 alternates.</text>
<rect x="44" y="3222" width="1032" height="178" rx="12" fill="#EBF5F6" stroke="#3F808A" stroke-width="1.5"/>
<text x="62" y="3248" font-size="15" font-family="Gotham, 'Century Gothic', sans-serif" fill="#3F808A" font-weight="bold" text-anchor="start" opacity="1.0">Add/Drop</text>
<text x="62" y="3268" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Schedules released August 3  ·  Add/drop window: August 5 (8am) – August 12 (11:59pm)</text>
<text x="62" y="3284" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Spring add/drop window in November (semester courses only)</text>
<text x="62" y="3300" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Year-long courses cannot be dropped or section-switched after the fall window closes (Dean approval only, extremely rare).</text>
<text x="62" y="3316" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Year-long course conflicting with a spring elective? Switch your year-long section during the fall window.</text>
<text x="62" y="3336" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Submit a Scheduling Error Form immediately (before add/drop opens) if any of these apply:</text>
<text x="62" y="3352" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">   Missing a graduation requirement  ·  Wrong class count  ·  Missing a prerequisite  ·  Enrolled in a class you already took</text>
<text x="62" y="3368" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">   Sophomore not enrolled in Health  ·  Senior missing English or History any semester  ·  Under- or over-enrolled</text>
<text x="62" y="3385" font-size="11" fill="#3F808A" font-weight="bold" text-anchor="start" opacity="1.0">Class count: 9th grade = 7 classes (8 max)   ·   10th–12th = 6 classes (7 max)</text>
<rect x="44" y="3416" width="1032" height="46" rx="8" fill="#000000" stroke="#000000" stroke-width="1.5"/>
<text x="560" y="3434" font-size="11" fill="#686868" font-weight="normal" text-anchor="middle" opacity="1.0">Course request window:  April 12, 5pm  –  April 23, 11:59pm  ·  Cannot edit or submit after deadline</text>
<text x="560" y="3451" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e59f4b" font-weight="bold" text-anchor="middle" opacity="1.0">Click Save before exiting course requests.</text>
<text x="1068" y="3455" font-size="9" fill="#686868" font-weight="normal" text-anchor="end" opacity="1.0">Jeff Treviño, PhD  —  April 2026</text>
</g>
</svg>
