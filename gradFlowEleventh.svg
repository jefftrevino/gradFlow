<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1120 1042" xmlns="http://www.w3.org/2000/svg"
     font-family="'Goudy Old Style', Georgia, serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#686868"/>
  </marker>
</defs>
<rect width="1120" height="1042" fill="#FFFFFF"/>
<g transform="translate(0, -1312)">
<rect x="44" y="1332" width="1032" height="48" rx="10" fill="#000000" stroke="#000000" stroke-width="1.5"/>
<text x="560" y="1352" font-size="17" font-family="Gotham, 'Century Gothic', sans-serif" fill="white" font-weight="bold" text-anchor="middle" opacity="1.0">11th Grade</text>
<text x="560" y="1369" font-size="10" fill="rgba(255,255,255,0.65)" font-weight="normal" text-anchor="middle" opacity="1.0">5 course selection requests per semester</text>
<rect x="44" y="1382" width="1032" height="62" rx="10" fill="#F5F5F5" stroke="#686868" stroke-width="1.5"/>
<text x="62" y="1404" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Auto-enrolled (both year-long):</text>
<text x="62" y="1422" font-size="12" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">English 3 Honors  ·  US History Honors</text>
<text x="62" y="1437" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">Neither uses a selection slot.</text>
<line x1="560" y1="1444" x2="560" y2="1488" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="1496" width="1032" height="120" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="1516" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Required year-long — uses 1 slot per semester</text>
<text x="62" y="1534" font-size="12" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">2.  Science elective — request your first-choice course.</text>
<text x="62" y="1552" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   Then rank all other science courses as alternates (not just 5 — rank all of them).</text>
<text x="62" y="1570" font-size="11" fill="#DC2626" font-weight="normal" text-anchor="start" opacity="1.0">⚠  Skipping any from the list means losing scheduling priority.</text>
<text x="62" y="1588" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   Ethics in the Sciences counts as a G elective, not a lab science — exclude it here.</text>
<text x="62" y="1606" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">   Honors Physics? Talk with the teacher to verify prerequisites.</text>
<line x1="560" y1="1616" x2="560" y2="1660" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="1668" width="1032" height="75" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="1688" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Math and World Languages — check which apply (year-long, 1 slot each per semester)</text>
<text x="62" y="1706" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">☐  Math 3-year req not yet met  →  request next level. Track change? Contact the department chair before Apr 23.</text>
<text x="62" y="1724" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">☐  World Languages 3-year + Level 3 not yet met  →  request next level. Track change? Contact the department chair before Apr 23.</text>
<line x1="560" y1="1770" x2="560" y2="1814" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="1822" width="1032" height="62" rx="10" fill="#FDF5E4" stroke="#e59f4b" stroke-width="1.5"/>
<text x="62" y="1842" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">6th class (required to meet six-class minimum):</text>
<text x="62" y="1860" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Flex Pool item first, or free elective (Performing / Technical / Visual Arts or G elective). Rank ≥5 alternates.</text>
<line x1="560" y1="1884" x2="560" y2="1928" stroke="#686868" stroke-width="2" marker-end="url(#arr)"/>
<rect x="44" y="1936" width="1032" height="118" rx="10" fill="#EEF3FA" stroke="#4D75C5" stroke-width="1.5"/>
<text x="62" y="1956" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4D75C5" font-weight="bold" text-anchor="start" opacity="1.0">7th class (optional, not guaranteed):</text>
<text x="62" y="1974" font-size="11" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Flex Pool item, free elective, Teaching Assistant, or independent study.</text>
<text x="62" y="1992" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Teaching Assistant / Independent Study: have an informal conversation with the teacher first.</text>
<text x="62" y="2006" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Note their name and class using the notepad icon when requesting.</text>
<text x="62" y="2020" font-size="10" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Official Teaching Assistant / Independent Study form releases in early August — complete it then.</text>
<text x="62" y="2034" font-size="10" fill="#686868" font-weight="normal" text-anchor="start" opacity="1.0">Haven't decided? You have until end of week 2 of the semester.</text>
<text x="62" y="2048" font-size="10" fill="#4D75C5" font-weight="normal" text-anchor="start" opacity="1.0">Skip this slot entirely if you don't want a 7th class.</text>
</g>
<g transform="translate(0, -2460)">
<rect x="44" y="3222" width="1032" height="178" rx="12" fill="#EBF5F6" stroke="#3F808A" stroke-width="1.5"/>
<text x="62" y="3248" font-size="15" font-family="Gotham, 'Century Gothic', sans-serif" fill="#3F808A" font-weight="bold" text-anchor="start" opacity="1.0">Add/Drop</text>
<text x="62" y="3268" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Schedules released August 3  ·  Add/drop window: August 5 (8am) – August 12 (11:59pm)</text>
<text x="62" y="3284" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Spring add/drop window in November (semester courses only)</text>
<text x="62" y="3300" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Year-long courses cannot be dropped or section-switched after the fall window closes (Dean approval only, extremely rare).</text>
<text x="62" y="3316" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">Year-long course conflicting with a spring elective? Switch your year-long section during the fall window.</text>
<text x="62" y="3336" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#000000" font-weight="bold" text-anchor="start" opacity="1.0">Submit a Scheduling Error Form immediately (before add/drop opens) if any of these apply:</text>
<text x="62" y="3352" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">   Missing a graduation requirement  ·  Wrong class count  ·  Missing a prerequisite  ·  Enrolled in a class you already took</text>
<text x="62" y="3368" font-size="11" fill="#000000" font-weight="normal" text-anchor="start" opacity="1.0">   Sophomore not enrolled in Health  ·  Senior missing English or History any semester  ·  Under- or over-enrolled</text>
<text x="62" y="3385" font-size="11" fill="#3F808A" font-weight="bold" text-anchor="start" opacity="1.0">Class count: 9th grade = 7 classes (8 max)   ·   10th–12th = 6 classes (7 max)</text>
<rect x="44" y="3416" width="1032" height="46" rx="8" fill="#000000" stroke="#000000" stroke-width="1.5"/>
<text x="560" y="3434" font-size="11" fill="#686868" font-weight="normal" text-anchor="middle" opacity="1.0">Course request window:  April 12, 5pm  –  April 23, 11:59pm  ·  Cannot edit or submit after deadline</text>
<text x="560" y="3451" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e59f4b" font-weight="bold" text-anchor="middle" opacity="1.0">Click Save before exiting course requests.</text>
<text x="1068" y="3455" font-size="9" fill="#686868" font-weight="normal" text-anchor="end" opacity="1.0">Jeff Treviño, PhD  —  April 2026</text>
</g>
</svg>
